<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Next Step Decision Engine</title>
<style>
body { font-family: Arial, sans-serif; margin: 0; background: #0b1220; color: #e5e7eb; }
.container { max-width: 900px; margin: auto; padding: 24px; }
.card { background: #111a2e; padding: 20px; border-radius: 14px; margin-bottom: 18px; }
input, select, textarea { width: 100%; padding: 10px; margin-top: 8px; margin-bottom: 14px; border-radius: 8px; border: none; background: #0f172a; color: #e5e7eb; }
button { padding: 12px 18px; border: none; border-radius: 8px; background: #38bdf8; color: black; font-weight: bold; cursor: pointer; }
.next { border-left: 4px solid #38bdf8; padding-left: 12px; margin-top: 10px; }
.small { color: #94a3b8; font-size: 0.9em; }
.badge { display:inline-block; padding:4px 8px; border-radius:999px; background:#1f2937; margin-right:6px; font-size:12px; }
</style>
</head>
<body>
<div class="container">

<h1>Next Step Decision Engine</h1>
<p class="small">One high-leverage action. Not a roadmap. Not options. Just the next move.</p>

<div class="card">
<h2>Input</h2>

<label>Target Outcome</label>
<input id="goal" placeholder="e.g. Software Engineer, Data Analyst">

<label>Current Evidence of Skill</label>
<textarea id="skill" placeholder="e.g. 1 small React project, basic Python, no internships"></textarea>

<label>Time Available (hrs/week)</label>
<input id="time" type="number">

<label>Urgency</label>
<select id="urgency">
<option>Low (exploring)</option>
<option>Medium (transitioning)</option>
<option>High (need job ASAP)</option>
</select>

<button onclick="generate()">Generate Next Step</button>
</div>

<div id="output"></div>

</div>

<script>
function generate() {
  const goal = document.getElementById('goal').value;
  const skill = document.getElementById('skill').value;
  const time = parseInt(document.getElementById('time').value || 0);
  const urgency = document.getElementById('urgency').value;

  let step = "";
  let why = "";
  let unlocks = "";

  if (time < 8) {
    step = "Build ONE deployable portfolio project tightly aligned with " + goal;
    why = "Low time constraint means optimization for signal, not breadth.";
    unlocks = "Interview credibility + resume signal";
  } else if (urgency.includes("High")) {
    step = "Apply to 20 roles AFTER building a single minimal proof project";
    why = "Urgency prioritizes exposure over perfect preparation.";
    unlocks = "Fast feedback loop from market";
  } else {
    step = "Rebuild a real-world system end-to-end in " + goal + " domain";
    why = "Maximizes skill compression per hour invested.";
    unlocks = "Deep competency + portfolio strength";
  }

  document.getElementById('output').innerHTML = `
    <div class="card">
      <h2>Next Step (Do This First)</h2>
      <div class="next">
        <h3>${step}</h3>
      </div>
      <p class="small">Time estimate: 3–14 days depending on execution speed</p>
    </div>

    <div class="card">
      <h2>Why this is optimal</h2>
      <p>${why}</p>
      <div>
        <span class="badge">highest leverage</span>
        <span class="badge">constraint-aware</span>
        <span class="badge">non-generic</span>
      </div>
    </div>

    <div class="card">
      <h2>What this unlocks</h2>
      <p>${unlocks}</p>
    </div>

    <div class="card">
      <h2>What NOT to do</h2>
      <ul>
        <li>Do not start tutorials without building</li>
        <li>Do not expand scope beyond this task</li>
        <li>Do not switch goals mid-execution</li>
      </ul>
    </div>
  `;
}
</script>

</body>
</html>
